<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #c0000a;
      --red-bright: #ff1a27;
      --red-glow:   rgba(192, 0, 10, 0.55);
      --dark:       #0a0000;
      --card-bg:    rgba(10, 0, 0, 0.72);
      --border:     rgba(192, 0, 10, 0.35);
      --text:       #f0e6e6;
      --muted:      rgba(240, 230, 230, 0.45);
    }

    html, body {
      height: 100%;
      font-family: 'Raleway', sans-serif;
      background: var(--dark);
      overflow: hidden;
    }

    /* ── FUNDO DE VÍDEO ── */
    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
      filter: brightness(0.55) saturate(1.2);
    }

    /* ── SOBREPOSIÇÃO ── */
    .overlay {
      position: fixed;
      inset: 0;
    }

    /* Linhas de varredura */
    .overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.08) 3px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
    }

    /* ── DISPOSIÇÃO ── */
    .scene {
      position: relative;
      z-index: 2;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* ── CARTÃO ── */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: clamp(2rem, 6vw, 3rem) clamp(1.5rem, 5vw, 2.5rem);
      
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 0 60px rgba(192,0,10,0.18),
        0 30px 80px rgba(0,0,0,0.7);
      animation: cardIn 0.9s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* ── CABEÇALHO ── */
    .card-header {
      text-align: center;
      margin-bottom: 2.2rem;
      animation: fadeUp 0.7s 0.15s both;
    }

    .sigil {
      width: 52px; height: 52px;
      margin: 0 auto 1rem;
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }

    .sigil svg {
      width: 100%; height: 100%;
      filter: drop-shadow(0 0 8px var(--red-glow));
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { filter: drop-shadow(0 0 6px var(--red-glow)); }
      50%      { filter: drop-shadow(0 0 18px var(--red-glow)); }
    }

    .card-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.3rem, 4vw, 1.75rem);
      font-weight: 900;
      letter-spacing: 0.18em;
      color: var(--text);
      text-transform: uppercase;
      line-height: 1.1;
    }

    .card-title span {
      color: var(--red-bright);
      text-shadow: 0 0 20px var(--red-glow);
    }

    .card-sub {
      font-size: 0.72rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.4rem;
    }

    /* ── DIVISOR ── */
    .divider {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 1.8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border));
    }
    .divider::after { background: linear-gradient(to left, transparent, var(--border)); }
    .divider-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 8px var(--red-glow);
    }

    /* ── FORMULÁRIO ── */
    .form { display: flex; flex-direction: column; gap: 1.1rem; }

    .field {
      display: flex; flex-direction: column; gap: 0.4rem;
      animation: fadeUp 0.6s both;
    }
    .field:nth-child(1) { animation-delay: 0.25s; }
    .field:nth-child(2) { animation-delay: 0.35s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    label {
      font-size: 0.68rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .input-wrap {
      position: relative;
      display: flex; align-items: center;
    }

    .input-wrap svg {
      position: absolute;
      left: 0.85rem;
      width: 15px; height: 15px;
      color: var(--muted);
      pointer-events: none;
      transition: color 0.25s;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.6rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: 'Raleway', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }

    input::placeholder { color: var(--muted); }

    input:focus {
      border-color: var(--red);
      background: rgba(192,0,10,0.07);
      box-shadow: 0 0 0 3px rgba(192,0,10,0.15), inset 0 0 12px rgba(192,0,10,0.08);
    }

    input:focus + svg,
    .input-wrap:focus-within svg { color: var(--red-bright); }

    /* alternar olho */
    .eye-btn {
      position: absolute; right: 0.85rem;
      background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 0; display: flex;
      transition: color 0.2s;
    }
    .eye-btn:hover { color: var(--red-bright); }
    .eye-btn svg { width: 16px; height: 16px; }

    /* ── EXTRAS ── */
    .extras {
      display: flex; justify-content: space-between; align-items: center;
      animation: fadeUp 0.6s 0.42s both;
    }

    .remember {
      display: flex; align-items: center; gap: 0.5rem;
      cursor: pointer;
      font-size: 0.75rem;
      color: var(--muted);
      user-select: none;
    }

    .remember input[type=checkbox] { display: none; }
    .checkbox-box {
      width: 14px; height: 14px;
      border: 1px solid var(--border);
      border-radius: 2px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }
    .remember input:checked ~ .checkbox-box {
      background: var(--red);
      border-color: var(--red);
    }
    .checkbox-box svg { width: 9px; height: 9px; color: #fff; opacity: 0; transition: opacity 0.2s; }
    .remember input:checked ~ .checkbox-box svg { opacity: 1; }

    .forgot {
      font-size: 0.72rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }
    .forgot:hover { color: var(--red-bright); }

    /* ── BOTÃO ── */
    .btn {
      position: relative;
      overflow: hidden;
      padding: 0.85rem;
      background: var(--red);
      border: none;
      border-radius: 3px;
      color: #fff;
      font-family: 'Cinzel', serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.25s, box-shadow 0.25s, transform 0.15s;
      box-shadow: 0 0 24px rgba(192,0,10,0.35);
      animation: fadeUp 0.6s 0.5s both;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
      opacity: 0; transition: opacity 0.25s;
    }

    .btn:hover {
      background: var(--red-bright);
      box-shadow: 0 0 40px rgba(255,26,39,0.5);
      transform: translateY(-1px);
    }
    .btn:hover::before { opacity: 1; }
    .btn:active { transform: translateY(0); }

    /* Efeito de ondulação */
    .btn .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      transform: scale(0);
      animation: ripple 0.55s linear;
      pointer-events: none;
    }
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    /* ── RODAPÉ ── */
    .card-footer {
      text-align: center;
      margin-top: 1.6rem;
      font-size: 0.75rem;
      color: var(--muted);
      animation: fadeUp 0.6s 0.6s both;
    }

    .card-footer a {
      color: var(--red-bright);
      text-decoration: none;
      font-weight: 500;
      transition: text-shadow 0.2s;
    }
    .card-footer a:hover { text-shadow: 0 0 10px var(--red-glow); }

    /* ── ACENTOS DE CANTO ── */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      border-color: var(--red);
      border-style: solid;
    }
    .card { position: relative; }
    .card::before {
      top: -1px; left: -1px;
      border-width: 2px 0 0 2px;
    }
    .card::after {
      bottom: -1px; right: -1px;
      border-width: 0 2px 2px 0;
    }

    /* ── RESPONSIVO ── */
    @media (max-width: 480px) {
      .card { border-radius: 2px; }
    }
  </style>  
</head>
<body>

  <!-- FUNDO DE VÍDEO -->
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="crimson-assassin-moewalls-com.mp4" type="video/mp4"/>
  </video>

  <div class="overlay"></div>

  <div class="scene">
    <div class="card">

      <!-- Cabeçalho -->
      <div class="card-header">
        <div class="sigil">
          <!-- Adaga / símbolo do assassino -->
          <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="26,4 29,22 26,26 23,22" fill="#c0000a"/>
            <polygon points="26,26 29,30 26,48 23,30" fill="#800008"/>
            <polygon points="14,26 22,24 26,26 22,28" fill="#c0000a"/>
            <polygon points="26,26 30,24 38,26 30,28" fill="#800008"/>
            <circle cx="26" cy="26" r="3" fill="#ff1a27"/>
            <circle cx="26" cy="26" r="5" fill="none" stroke="#c0000a" stroke-width="0.8" opacity="0.6"/>
            <circle cx="26" cy="26" r="9" fill="none" stroke="#c0000a" stroke-width="0.5" opacity="0.3"/>
          </svg>
        </div>
        <h1 class="card-title">Crim<span>son</span></h1>
        <p class="card-sub">Acesso Restrito</p>
      </div>

      <div class="divider"><div class="divider-dot"></div></div>

      <!-- Formulário -->
      <form class="form" onsubmit="handleLogin(event)">

        <div class="field">
          <label for="email">Identificação</label>
          <div class="input-wrap">
            <input id="email" type="email" placeholder="seu@email.com" autocomplete="email" required/>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position:absolute;left:.85rem;pointer-events:none">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <div class="input-wrap">
            <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required/>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position:absolute;left:.85rem;pointer-events:none">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <button type="button" class="eye-btn" onclick="togglePassword()" aria-label="Mostrar senha">
              <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="extras">
          <label class="remember">
            <input type="checkbox" id="remember"/>
            <span class="checkbox-box">
              <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="1.5,5 4,7.5 8.5,2.5"/>
              </svg>
            </span>
            Lembrar acesso
          </label>
          <a href="#" class="forgot">Esqueci a senha</a>
        </div>

        <button type="submit" class="btn" id="loginBtn">Entrar</button>

      </form>

      <div class="card-footer">
        Sem conta? <a href="#">Solicitar acesso</a>
      </div>

    </div>
  </div>

  <script>
    // Alternar senha
    function togglePassword() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('eye-icon');
      const show  = input.type === 'password';
      input.type  = show ? 'text' : 'password';
      icon.innerHTML = show
        ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`
        : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    }

    // Efeito de ondulação
    document.getElementById('loginBtn').addEventListener('click', function(e) {
      const btn  = this;
      const rect = btn.getBoundingClientRect();
      const rip  = document.createElement('span');
      const size = Math.max(btn.clientWidth, btn.clientHeight);
      rip.className = 'ripple';
      rip.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
      btn.appendChild(rip);
      setTimeout(() => rip.remove(), 600);
    });

    // Envio do formulário
    function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.textContent = 'Verificando...';
      btn.disabled = true;
      setTimeout(() => {
        btn.textContent = 'Entrar';
        btn.disabled = false;
      }, 2000);
    }
  </script>
</body>
</html>
